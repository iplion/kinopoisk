spring:
  datasource:
    url: jdbc:h2:mem:films-test;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=YEAR;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jms:
    listener:
      auto-startup: false
  activemq:
    broker-url: vm://localhost?broker.persistent=false
    user: admin
    password: admin

app:
  kinopoisk:
    base-url: http://localhost
    api-key: test-api-key
  scheduler:
    grab-kinopoisk:
      enabled: false
