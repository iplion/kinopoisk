databaseChangeLog:
  - changeSet:
      id: 001-init-db
      author: iplion
      changes:
        - createTable:
            tableName: films
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: film_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: film_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: year
                  type: INT

              - column:
                  name: rating
                  type: NUMERIC(3, 1)

              - column:
                  name: description
                  type: TEXT
